name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fintrack-api

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: fintrack_test
          MYSQL_USER: fintrack_user
          MYSQL_PASSWORD: fintrack_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: fintrack_test
          DB_USER: fintrack_user
          DB_PASSWORD: fintrack_pass
          JWT_SECRET: ci-test-secret-min-256-bits-xxxxxxxxxxxxxxxxxxxxx
          SPRING_PROFILES_ACTIVE: dev
        run: mvn -B verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: fintrack-api/target/surefire-reports/
          retention-days: 7
